<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Megabrand 9000 — Digital AI Agency</title>
  <meta name="description" content="Megabrand 9000 — Automate the boring. Elevate the weird. Digital AI agency for brands that don't play it safe.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Playfair+Display:ital,wght@0,400;0,500;1,400;1,500&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Space Grotesk', sans-serif;
      background: #C8E619;
      min-height: 100vh;
      overflow-x: hidden;
    }

    .page-wrap {
      padding: 20px;
      min-height: 100vh;
    }

    /* ── Card ── */
    .card {
      position: relative;
    }

    .card-hero {
      background: #0D1F0D;
      border-radius: 24px 24px 0 0;
      min-height: 78vh;
      display: flex;
      flex-direction: column;
      position: relative;
    }

    .card-bottom {
      background: #fff;
      border-radius: 0 0 24px 24px;
      padding: 48px 40px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 24px;
      position: relative;
      z-index: 20;
    }

    /* ── Nav ── */
    nav {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 24px 40px;
      position: relative;
      z-index: 40;
    }

    .nav-logo {
      display: flex;
      align-items: center;
      gap: 12px;
      opacity: 0;
      transform: translateY(-20px);
      animation: fadeDown 0.5s ease-out 0.1s forwards;
    }

    .nav-logo img {
      width: 40px;
      height: 40px;
      border-radius: 50%;
      object-fit: cover;
    }

    .nav-logo-text {
      line-height: 1.1;
    }

    .nav-logo-text span {
      display: block;
      color: #fff;
      font-weight: 700;
      font-size: 13px;
      letter-spacing: 0.2em;
      text-transform: uppercase;
    }

    .nav-logo-text .logo-9000 {
      position: relative;
      display: inline-block;
    }

    .squiggle {
      position: absolute;
      bottom: -5px;
      left: 0;
      width: 100%;
      height: 6px;
    }

    .nav-center {
      color: #fff;
      font-family: 'Playfair Display', serif;
      font-size: 18px;
      font-weight: 400;
      opacity: 0;
      transform: translateY(-20px);
      animation: fadeDown 0.5s ease-out 0.2s forwards;
    }

    .nav-cta {
      opacity: 0;
      transform: translateY(-20px);
      animation: fadeDown 0.5s ease-out 0.3s forwards;
    }

    .btn {
      font-family: 'Space Grotesk', sans-serif;
      background: #F5C518;
      color: #0D1F0D;
      font-weight: 700;
      font-size: 14px;
      padding: 12px 28px;
      border-radius: 100px;
      border: none;
      cursor: pointer;
      transition: transform 0.2s ease, box-shadow 0.2s ease;
      text-decoration: none;
      display: inline-block;
      letter-spacing: 0.01em;
    }

    .btn:hover {
      transform: scale(1.05);
      box-shadow: 0 0 24px rgba(245, 197, 24, 0.45);
    }

    .btn-lg {
      font-size: 18px;
      font-weight: 700;
      padding: 16px 36px;
    }

    .btn-lg em {
      font-family: 'Playfair Display', serif;
      font-style: italic;
      font-weight: 500;
    }

    /* ── Hero ── */
    .hero-content {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 0 40px 60px;
      position: relative;
    }

    .hero-logo {
      width: 55vw;
      max-width: 780px;
      margin-left: -5vw;
      position: relative;
      z-index: 10;
      opacity: 0;
      transform: scale(0.8);
      animation: logoIn 0.7s cubic-bezier(0.34, 1.56, 0.64, 1) 0.3s forwards;
    }

    /* ── Mascot ── */
    .mascot-wrap {
      position: absolute;
      right: 48px;
      bottom: 40px;
      z-index: 30;
      opacity: 0;
      transform: translateX(80px);
      animation: mascotIn 0.7s cubic-bezier(0.34, 1.56, 0.64, 1) 0.6s forwards;
    }

    .mascot-wrap img {
      height: 420px;
      width: auto;
      filter: drop-shadow(0 8px 20px rgba(0,0,0,0.2));
    }

    /* ── Bottom bar ── */
    .bottom-text {
      opacity: 0;
      transform: translateY(24px);
      animation: fadeUp 0.6s ease-out 0.7s forwards;
    }

    .bottom-text h2 {
      color: #0D1F0D;
      font-family: 'Space Grotesk', sans-serif;
      font-size: clamp(24px, 3vw, 38px);
      font-weight: 700;
      line-height: 1.2;
    }

    .bottom-text .sub {
      font-family: 'Playfair Display', serif;
      font-style: italic;
      font-weight: 400;
      color: #0D1F0D;
      opacity: 0.7;
      font-size: clamp(20px, 2.5vw, 28px);
      margin-top: 6px;
    }

    .bottom-cta {
      flex-shrink: 0;
      opacity: 0;
      transform: translateY(24px);
      animation: fadeUp 0.6s ease-out 0.8s forwards;
    }

    /* ── Animations ── */
    @keyframes fadeDown {
      to { opacity: 1; transform: translateY(0); }
    }

    @keyframes fadeUp {
      to { opacity: 1; transform: translateY(0); }
    }

    @keyframes logoIn {
      to { opacity: 1; transform: scale(1); }
    }

    @keyframes mascotIn {
      to { opacity: 1; transform: translateX(0); }
    }

    @keyframes float {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-8px); }
    }

    /* ── Mobile ── */
    @media (max-width: 768px) {
      .page-wrap { padding: 12px; }
      nav { padding: 16px 20px; }
      .nav-center { display: none; }
      .hero-content { padding: 0 20px 40px; }
      .hero-logo {
        width: 80vw;
        margin-left: -8vw;
      }
      .mascot-wrap {
        right: 12px;
      }
      .mascot-wrap img {
        height: 240px;
      }
      .card-bottom {
        flex-direction: column;
        align-items: flex-start;
        padding: 32px 20px;
      }
      .card-hero {
        min-height: 70vh;
      }
    }

    @media (max-width: 480px) {
      .mascot-wrap img {
        height: 180px;
      }
      .hero-logo {
        width: 85vw;
        margin-left: -5vw;
      }
    }
  </style>
</head>
<body>
  <div class="page-wrap">
    <div class="card">

      <!-- Dark Green Hero -->
      <div class="card-hero">

        <!-- Nav -->
        <nav>
          <div class="nav-logo">
            <img src="/mascot.png" alt="MB9K">
            <div class="nav-logo-text">
              <span>Megabrand</span>
              <span class="logo-9000">
                9000
                <svg class="squiggle" viewBox="0 0 50 6" fill="none" preserveAspectRatio="none">
                  <path d="M0 3 Q6 0 12 3 Q18 6 24 3 Q30 0 36 3 Q42 6 50 3" stroke="#F5C518" stroke-width="2" fill="none"/>
                </svg>
              </span>
            </div>
          </div>

          <div class="nav-center">Design Studio</div>

          <div class="nav-cta">
            <a href="#" class="btn">Try for Free</a>
          </div>
        </nav>

        <!-- Hero -->
        <div class="hero-content">
          <img src="/logo3d.png" alt="Megabrand 9000" class="hero-logo">
        </div>

      </div>

      <!-- White Bottom -->
      <div class="card-bottom">
        <div class="bottom-text">
          <h2>Automate the boring. Elevate the weird.</h2>
          <div class="sub">Let's freaking go, my dude.</div>
        </div>
        <div class="bottom-cta">
          <a href="#" class="btn btn-lg">Let's Go <em>Mega Mode</em></a>
        </div>
      </div>

      <!-- Mascot overlapping both sections -->
      <div class="mascot-wrap">
        <img src="/mascot.png" alt="MB9K Mascot">
      </div>

    </div>
  </div>
</body>
</html>
